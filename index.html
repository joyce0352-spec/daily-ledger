<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日記帳</title>
  <style>
    :root {
      --ink: #23262f;
      --muted: #6f7785;
      --line: #dfe5ec;
      --paper: #fffdf8;
      --panel: rgba(255, 255, 255, 0.88);
      --soft: #f3f6fa;
      --income: #13795b;
      --expense: #c44949;
      --accent: #3f6fb5;
      --warm: #d68b3f;
      --shadow: 0 16px 40px rgba(39, 48, 68, 0.12);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(63, 111, 181, 0.11), transparent 36%),
        linear-gradient(315deg, rgba(214, 139, 63, 0.14), transparent 42%),
        var(--paper);
    }

    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1160px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--ink);
      background: white;
      border: 1px solid var(--line);
      box-shadow: 0 7px 20px rgba(31, 41, 55, 0.08);
    }

    .btn.primary {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn.quiet {
      background: rgba(255, 255, 255, 0.72);
      box-shadow: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 112px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 28px rgba(39, 48, 68, 0.08);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .metric strong {
      display: block;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(300px, 390px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(223, 229, 236, 0.92);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .form-panel {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    .content-panel { padding: 18px; }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    h2, h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h2 { font-size: 19px; }
    h3 { font-size: 15px; }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 5px;
      border-radius: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .segmented button {
      height: 38px;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
    }

    .segmented button.active {
      color: white;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(63, 111, 181, 0.22);
    }

    .segmented button[data-type="income"].active {
      background: var(--income);
      box-shadow: 0 8px 18px rgba(19, 121, 91, 0.22);
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin: 13px 0 7px;
    }

    input, select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: white;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(63, 111, 181, 0.14);
    }

    .form-row, .filters {
      display: grid;
      gap: 10px;
    }

    .form-row { grid-template-columns: 1fr 1fr; }
    .filters {
      grid-template-columns: 160px 1fr 150px;
      margin-bottom: 16px;
    }

    .submit-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .submit-row button { flex: 1; }

    .chart-wrap {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .chart, .category-box {
      min-height: 210px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }

    .chart h3, .category-box h3 { margin-bottom: 12px; }

    .bars {
      height: 150px;
      display: flex;
      align-items: end;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-top: 8px;
    }

    .bar {
      flex: 1;
      min-width: 18px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, var(--warm), #f0c987);
    }

    .bar-labels {
      display: flex;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .bar-labels span {
      flex: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-list, .list {
      display: grid;
      gap: 10px;
    }

    .category-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      font-size: 14px;
    }

    .track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft);
      margin-top: 5px;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      background: var(--warm);
    }

    .entry {
      display: grid;
      grid-template-columns: 84px 1fr auto 38px;
      gap: 12px;
      align-items: center;
      min-height: 68px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }

    .date, .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .main { min-width: 0; }

    .note {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta { margin-top: 4px; }

    .amount {
      font-weight: 800;
      white-space: nowrap;
      color: var(--expense);
    }

    .amount.income { color: var(--income); }

    .delete {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #fff0f0;
      color: #a43a3a;
      border: 1px solid #ffd0d0;
      font-size: 18px;
      line-height: 1;
    }

    .empty {
      min-height: 170px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.64);
      padding: 24px;
    }

    @media (max-width: 900px) {
      .grid, .chart-wrap, .summary { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }

    @media (max-width: 680px) {
      .app {
        width: min(100vw - 20px, 1160px);
        padding-top: 18px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar { justify-content: stretch; }
      .toolbar button { flex: 1; }
      .filters, .form-row { grid-template-columns: 1fr; }

      .entry {
        grid-template-columns: 1fr auto 38px;
      }

      .date { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>每日記帳</h1>
        <p class="subtitle">每天補一筆，這個月的錢就有跡可循。</p>
      </div>
      <div class="toolbar">
        <button class="btn quiet" id="exportBtn" type="button" title="匯出 CSV">匯出</button>
        <button class="btn quiet" id="clearBtn" type="button" title="清空全部資料">清空</button>
      </div>
    </header>

    <section class="summary" aria-label="收支摘要">
      <div class="metric">
        <span>本月收入</span>
        <strong id="incomeTotal">$0</strong>
      </div>
      <div class="metric">
        <span>本月支出</span>
        <strong id="expenseTotal">$0</strong>
      </div>
      <div class="metric">
        <span>本月結餘</span>
        <strong id="balanceTotal">$0</strong>
      </div>
    </section>

    <section class="grid">
      <form class="panel form-panel" id="entryForm">
        <div class="panel-title">
          <h2>新增一筆</h2>
        </div>

        <div class="segmented" aria-label="類型">
          <button class="active" data-type="expense" type="button">支出</button>
          <button data-type="income" type="button">收入</button>
        </div>

        <label for="amount">金額</label>
        <input id="amount" inputmode="decimal" min="0" name="amount" placeholder="例如 120" required type="number">

        <div class="form-row">
          <div>
            <label for="category">分類</label>
            <select id="category" name="category"></select>
          </div>
          <div>
            <label for="date">日期</label>
            <input id="date" name="date" required type="date">
          </div>
        </div>

        <label for="note">備註</label>
        <input id="note" maxlength="40" name="note" placeholder="早餐、薪水、交通..." type="text">

        <div class="submit-row">
          <button class="btn primary" type="submit">加入</button>
          <button class="btn quiet" id="resetBtn" type="button">重填</button>
        </div>
      </form>

      <section class="panel content-panel">
        <div class="panel-title">
          <h2>帳本</h2>
        </div>

        <div class="filters">
          <input id="monthFilter" type="month" aria-label="月份篩選">
          <input id="searchInput" type="search" placeholder="搜尋備註或分類" aria-label="搜尋">
          <select id="typeFilter" aria-label="類型篩選">
            <option value="all">全部</option>
            <option value="expense">只看支出</option>
            <option value="income">只看收入</option>
          </select>
        </div>

        <div class="chart-wrap">
          <div class="chart">
            <h3>最近 7 天支出</h3>
            <div class="bars" id="bars"></div>
            <div class="bar-labels" id="barLabels"></div>
          </div>
          <div class="category-box">
            <h3>本月支出分類</h3>
            <div class="category-list" id="categoryList"></div>
          </div>
        </div>

        <div class="list" id="entryList"></div>
      </section>
    </section>
  </main>

  <script>
    const storageKey = "daily-ledger-v1";
    const categories = {
      expense: ["孝親(含賴媽)", "啾寶", "購物", "食材", "飲食", "日用品", "交通", "運動", "公益", "數位", "醫療", "休閒旅遊", "社交/禮物", "其他"],
      income: ["薪資", "獎金", "投資", "兼職", "禮金", "其他"]
    };

    const state = {
      type: "expense",
      entries: JSON.parse(localStorage.getItem(storageKey) || "[]")
    };

    const $ = (selector) => document.querySelector(selector);
    const formatter = new Intl.NumberFormat("zh-TW", {
      style: "currency",
      currency: "TWD",
      maximumFractionDigits: 0
    });

    const today = new Date();
    const pad = (value) => String(value).padStart(2, "0");
    const toDateInput = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    const toMonthInput = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    const money = (value) => formatter.format(value || 0);

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(state.entries));
    }

    function setType(type) {
      state.type = type;
      document.querySelectorAll(".segmented button").forEach((button) => {
        button.classList.toggle("active", button.dataset.type === type);
      });
      renderCategoryOptions();
    }

    function renderCategoryOptions() {
      $("#category").innerHTML = categories[state.type]
        .map((item) => `<option value="${item}">${item}</option>`)
        .join("");
    }

    function visibleEntries() {
      const month = $("#monthFilter").value;
      const search = $("#searchInput").value.trim().toLowerCase();
      const type = $("#typeFilter").value;

      return state.entries
        .filter((entry) => !month || entry.date.startsWith(month))
        .filter((entry) => type === "all" || entry.type === type)
        .filter((entry) => {
          if (!search) return true;
          return `${entry.category} ${entry.note}`.toLowerCase().includes(search);
        })
        .sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
    }

    function renderSummary() {
      const month = $("#monthFilter").value;
      const monthEntries = state.entries.filter((entry) => entry.date.startsWith(month));
      const income = monthEntries
        .filter((entry) => entry.type === "income")
        .reduce((total, entry) => total + entry.amount, 0);
      const expense = monthEntries
        .filter((entry) => entry.type === "expense")
        .reduce((total, entry) => total + entry.amount, 0);

      $("#incomeTotal").textContent = money(income);
      $("#expenseTotal").textContent = money(expense);
      $("#balanceTotal").textContent = money(income - expense);
      $("#balanceTotal").style.color = income - expense >= 0 ? "var(--income)" : "var(--expense)";
    }

    function renderBars() {
      const days = Array.from({ length: 7 }, (_, index) => {
        const date = new Date(today);
        date.setDate(today.getDate() - (6 - index));
        const key = toDateInput(date);
        const total = state.entries
          .filter((entry) => entry.type === "expense" && entry.date === key)
          .reduce((sum, entry) => sum + entry.amount, 0);
        return { label: `${date.getMonth() + 1}/${date.getDate()}`, total };
      });
      const max = Math.max(...days.map((day) => day.total), 1);

      $("#bars").innerHTML = days.map((day) => {
        const height = Math.max((day.total / max) * 100, day.total ? 8 : 2);
        return `<div class="bar" title="${day.label} ${money(day.total)}" style="height:${height}%"></div>`;
      }).join("");
      $("#barLabels").innerHTML = days.map((day) => `<span>${day.label}</span>`).join("");
    }

    function renderCategoryBreakdown() {
      const month = $("#monthFilter").value;
      const totals = new Map();
      state.entries
        .filter((entry) => entry.type === "expense" && entry.date.startsWith(month))
        .forEach((entry) => totals.set(entry.category, (totals.get(entry.category) || 0) + entry.amount));

      const items = [...totals.entries()].sort((a, b) => b[1] - a[1]);
      const max = Math.max(...items.map((item) => item[1]), 1);
      $("#categoryList").innerHTML = items.length
        ? items.map(([name, total]) => `
          <div class="category-item">
            <div>
              <strong>${name}</strong>
              <div class="track"><div class="fill" style="width:${(total / max) * 100}%"></div></div>
            </div>
            <span>${money(total)}</span>
          </div>
        `).join("")
        : `<div class="empty">這個月還沒有支出分類。</div>`;
    }

    function renderList() {
      const entries = visibleEntries();
      $("#entryList").innerHTML = entries.length
        ? entries.map((entry) => `
          <article class="entry">
            <div class="date">${entry.date}</div>
            <div class="main">
              <div class="note">${entry.note || entry.category}</div>
              <div class="meta">${entry.type === "income" ? "收入" : "支出"} · ${entry.category}</div>
            </div>
            <div class="amount ${entry.type === "income" ? "income" : ""}">
              ${entry.type === "income" ? "+" : "-"}${money(entry.amount)}
            </div>
            <button class="delete" data-id="${entry.id}" title="刪除" type="button">×</button>
          </article>
        `).join("")
        : `<div class="empty">目前沒有符合條件的紀錄。</div>`;
    }

    function render() {
      renderSummary();
      renderBars();
      renderCategoryBreakdown();
      renderList();
    }

    function resetForm() {
      $("#entryForm").reset();
      $("#date").value = toDateInput(today);
      setType("expense");
      $("#amount").focus();
    }

    function exportCsv() {
      const rows = [["日期", "類型", "分類", "金額", "備註"], ...state.entries.map((entry) => [
        entry.date,
        entry.type === "income" ? "收入" : "支出",
        entry.category,
        entry.amount,
        entry.note || ""
      ])];
      const csv = rows.map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `每日記帳-${toDateInput(new Date())}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".segmented button").forEach((button) => {
      button.addEventListener("click", () => setType(button.dataset.type));
    });

    $("#entryForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const amount = Number($("#amount").value);
      if (!amount || amount <= 0) return;

      state.entries.push({
        id: crypto.randomUUID(),
        createdAt: Date.now(),
        type: state.type,
        amount,
        category: $("#category").value,
        date: $("#date").value,
        note: $("#note").value.trim()
      });
      save();
      resetForm();
      render();
    });

    $("#entryList").addEventListener("click", (event) => {
      const button = event.target.closest(".delete");
      if (!button) return;
      state.entries = state.entries.filter((entry) => entry.id !== button.dataset.id);
      save();
      render();
    });

    $("#monthFilter").addEventListener("change", render);
    $("#searchInput").addEventListener("input", renderList);
    $("#typeFilter").addEventListener("change", renderList);
    $("#resetBtn").addEventListener("click", resetForm);
    $("#exportBtn").addEventListener("click", exportCsv);
    $("#clearBtn").addEventListener("click", () => {
      if (!state.entries.length) return;
      if (!confirm("確定要清空所有記帳資料嗎？")) return;
      state.entries = [];
      save();
      render();
    });

    $("#date").value = toDateInput(today);
    $("#monthFilter").value = toMonthInput(today);
    renderCategoryOptions();
    render();
  </script>
</body>
</html>
